<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" role="img" aria-label="VonWillingh Online  Custom web applications for South African businesses">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="55%" stop-color="#152a45"/>
      <stop offset="100%" stop-color="#0f2238"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="100%" stop-color="#c49a3f"/>
    </linearGradient>
  </defs>
  <rect width="1640" height="624" fill="url(#bg)"/>

  <!-- Subtle grid  professional tech aesthetic -->
  <g opacity="0.06" stroke="#f5f0e8" stroke-width="1">
    <line x1="0" y1="78" x2="1640" y2="78"/>
    <line x1="0" y1="156" x2="1640" y2="156"/>
    <line x1="0" y1="234" x2="1640" y2="234"/>
    <line x1="0" y1="312" x2="1640" y2="312"/>
    <line x1="0" y1="390" x2="1640" y2="390"/>
    <line x1="0" y1="468" x2="1640" y2="468"/>
    <line x1="0" y1="546" x2="1640" y2="546"/>
    <line x1="205" y1="0" x2="205" y2="624"/>
    <line x1="410" y1="0" x2="410" y2="624"/>
    <line x1="615" y1="0" x2="615" y2="624"/>
    <line x1="820" y1="0" x2="820" y2="624"/>
    <line x1="1025" y1="0" x2="1025" y2="624"/>
    <line x1="1230" y1="0" x2="1230" y2="624"/>
    <line x1="1435" y1="0" x2="1435" y2="624"/>
  </g>

  <!-- Decorative accent orb  right side -->
  <circle cx="1380" cy="180" r="220" fill="#d4a853" opacity="0.08"/>
  <circle cx="1480" cy="480" r="160" fill="#f5f0e8" opacity="0.04"/>

  <!-- Safe zone: keep left ~380px clear for profile picture overlap -->
  <g transform="translate(420, 0)">
    <text x="0" y="210" fill="#d4a853" font-family="system-ui, 'Segoe UI', sans-serif" font-size="28" font-weight="600" letter-spacing="0.2em">VONWILLINGH ONLINE</text>

    <text x="0" y="300" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700">Custom web applications</text>
    <text x="0" y="378" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700">for South African businesses</text>

    <rect x="0" y="420" width="120" height="5" rx="2.5" fill="url(#accent)"/>

    <text x="0" y="490" fill="#f5f0e8" font-family="system-ui, 'Segoe UI', sans-serif" font-size="26" opacity="0.9">Websites · Dashboards · LMS · Digital cards</text>
    <text x="0" y="540" fill="#f5f0e8" font-family="system-ui, 'Segoe UI', sans-serif" font-size="22" opacity="0.7">vonwillingh.co.za · Starter websites from R1,999</text>
